<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Watch Party Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🎬 Watch Party + Voice Chat</h2>

<!-- ================= ROOM ================= -->

<button onclick="createRoom()">🏠 Oda Oluştur</button>

<br><br>

<input id="roomInput" placeholder="Oda kodu gir">
<button onclick="joinRoom()">🔑 Katıl</button>

<h3 id="roomDisplay">Oda yok</h3>

<a id="inviteLink" target="_blank"></a>

<hr>

<!-- ================= VIDEO ================= -->

<input id="ytInput" placeholder="YouTube link">

<button onclick="loadVideo()">🎥 Load</button>

<br><br>

<div id="playerContainer">
  <div id="player"></div>
</div>

<br>

<!-- CONTROLS -->

<button onclick="playVideo()">▶ Play</button>
<button onclick="pauseVideo()">⏸ Pause</button>
<button onclick="toggleFullscreen()">⛶ Fullscreen</button>

<br><br>

<!-- VOICE -->

<button onclick="toggleMic()">🎤 Mic Aç/Kapat</button>

<p style="opacity:0.6;">
Invite linki gönder → arkadaş direkt odaya girer
</p>

<!-- SOCKET -->
<script src="/socket.io/socket.io.js"></script>

<!-- APP -->
<script src="app.js"></script>

<!-- YOUTUBE API -->
<script src="https://www.youtube.com/iframe_api"></script>

</body>
</html>
